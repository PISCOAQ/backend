image:
  repository: ghcr.io/piscoaq/backend
  tag: main
  pullPolicy: Always

httpRoute:
  enabled: false

service:
  port: 5000

env:
  - name: MONGODB_URI
    valueFrom:
      secretKeyRef:
        name: mongodb-backend-credentials
        key: connectionString

volumes:
  - name: npm-cache
    emptyDir: {}

volumeMounts:
  - name: npm-cache
    mountPath: /.npm

livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http
